<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ab6c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00d084;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Rounded background -->
  <rect width="100" height="100" rx="20" fill="url(#grad)"/>

  <!-- Markdown document on left -->
  <rect x="12" y="30" width="25" height="32" rx="2" fill="white" opacity="0.9"/>
  <line x1="16" y1="36" x2="33" y2="36" stroke="#00ab6c" stroke-width="2" stroke-linecap="round"/>
  <line x1="16" y1="42" x2="30" y2="42" stroke="#00ab6c" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16" y1="47" x2="33" y2="47" stroke="#00ab6c" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16" y1="52" x2="28" y2="52" stroke="#00ab6c" stroke-width="1.5" stroke-linecap="round"/>
  <text x="14" y="40" font-family="monospace" font-size="8" fill="#00ab6c" font-weight="bold">#</text>

  <!-- Arrow in middle -->
  <path d="M 43 46 L 56 46" stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 52 42 L 56 46 L 52 50" stroke="white" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Medium "M" logo on right -->
  <circle cx="75" cy="46" r="16" fill="white" opacity="0.95"/>
  <text x="75" y="56" font-family="Georgia, serif" font-size="24" font-weight="bold" fill="#00ab6c" text-anchor="middle">M</text>

  <!-- Subtitle text -->
  <text x="50" y="80" font-family="Arial, sans-serif" font-size="10" font-weight="600" fill="white" text-anchor="middle" opacity="0.9">MD → MEDIUM</text>
</svg>
